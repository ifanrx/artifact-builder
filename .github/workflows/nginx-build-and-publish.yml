name: nginx / Build And Publish

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/nginx-build-and-publish.yml"
      - "nginx/**"
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      nginx_version:
        description: Optional nginx version to build instead of auto-detecting
        required: false
        type: string
      publish:
        description: Upload artifacts to the GitHub Release for this nginx version
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nginx-build-and-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-release:
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      nginx_version: ${{ steps.check.outputs.nginx_version }}
    steps:
      - uses: actions/checkout@v6

      - id: check
        env:
          NGINX_VERSION_OVERRIDE: ${{ inputs.nginx_version }}
        run: ./nginx/scripts/check-nginx-release.sh

  build:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: jammy
            runner: ubuntu-22.04
          - distro: noble
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    env:
      NGINX_VERSION: ${{ needs.check-release.outputs.nginx_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare build directories
        run: |
          echo "BUILD_ROOT=${RUNNER_TEMP}/build/${{ matrix.distro }}" >> "${GITHUB_ENV}"
          echo "OUTPUT_DIR=${RUNNER_TEMP}/output/${{ matrix.distro }}" >> "${GITHUB_ENV}"

      - name: Install build dependencies
        run: ./nginx/scripts/install-build-deps.sh

      - name: Fetch sources
        run: ./nginx/scripts/fetch-sources.sh "${BUILD_ROOT}" "${NGINX_VERSION}"

      - name: Build LuaJIT archive
        run: ./nginx/scripts/build-luajit-artifact.sh "${BUILD_ROOT}" "${{ matrix.distro }}" "${OUTPUT_DIR}"

      - name: Build nginx modules
        run: ./nginx/scripts/build-nginx-modules.sh "${BUILD_ROOT}" "${NGINX_VERSION}" "${OUTPUT_DIR}"

      - name: Verify nginx module linkage
        run: ./nginx/scripts/verify-nginx-modules.sh "${OUTPUT_DIR}/modules"

      - name: Write build manifest
        run: ./nginx/scripts/write-build-manifest.sh "${BUILD_ROOT}" "${NGINX_VERSION}" "${{ matrix.distro }}" "${OUTPUT_DIR}/build-manifest.env"

      - uses: actions/upload-artifact@v6
        with:
          name: nginx-build-${{ matrix.distro }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: error

  publish:
    needs:
      - check-release
      - build
    if: |
      success() &&
      (github.event_name == 'schedule' || inputs.publish == true)
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      NGINX_VERSION: ${{ needs.check-release.outputs.nginx_version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v5
        with:
          path: ${{ runner.temp }}/downloads

      - name: Prepare release directories
        run: echo "RELEASE_ASSET_DIR=${RUNNER_TEMP}/release-assets" >> "${GITHUB_ENV}"

      - name: Package release assets
        run: ./nginx/scripts/package-release-assets.sh "${RUNNER_TEMP}/downloads" "${RELEASE_ASSET_DIR}"

      - name: Publish GitHub Release assets
        run: ./nginx/scripts/publish-github-release.sh "${RELEASE_ASSET_DIR}" "${NGINX_VERSION}"

  update-tracked-version:
    needs:
      - check-release
      - publish
    if: github.event_name == 'schedule' && needs.publish.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Update tracked nginx version
        run: printf '%s\n' "${{ needs.check-release.outputs.nginx_version }}" > nginx/versions/nginx-version.txt

      - uses: peter-evans/create-pull-request@v8
        with:
          branch: nginx/chore/update-nginx-version-${{ needs.check-release.outputs.nginx_version }}
          commit-message: "chore(nginx): track nginx ${{ needs.check-release.outputs.nginx_version }}"
          title: "chore(nginx): track nginx ${{ needs.check-release.outputs.nginx_version }}"
          body: |
            Update the tracked nginx version after a successful scheduled build and publish.
